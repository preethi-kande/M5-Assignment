<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M5 Assignment</title>
    <script src="js/script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <style>
        h1              {margin-bottom: 30px;}
        label           {font-weight: bold;}
        input, select   {margin-bottom: 10px;}
        form {
            width: 450px;
            margin: 50px auto;
            padding: 25px;
            border: 2px solid #198754;
            border-radius: 10px;
            background: #f8f9fa;
        }
    </style>
</head>
<body class="m-4">
    <h1>Employee Management System</h1>
    <form id="empForm">
      <div class="mb-3">
        <label for="id" class="form-label">Employee ID</label>
        <input type="text" id="id" class="form-control" maxlength="8" required>
    </div>

    <div class="mb-3">
        <label for="name" class="form-label">Employee Name</label>
        <input type="text" id="name" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="ext" class="form-label">Extension</label>
        <input type="text" id="ext" class="form-control" maxlength="4" required>
    </div>

    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
    </div>

    <div class="mb-3">
        <label for="department" class="form-label">Department</label>
        <select id="department" class="form-select" required>
            <option value="">Select Department</option>
            <option>Administrative</option>
            <option>Engineering</option>
            <option>Executive</option>
            <option>Marketing</option>
            <option>Quality Assurance</option>
            <option>Sales</option>
        </select>
    </div>

    <button id="submit" class="btn btn-success w-100">Add Employee</button>
    </form>
</body>
</html>
